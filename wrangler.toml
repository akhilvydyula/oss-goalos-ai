# Workers Static Assets — output path lives here (no "output directory" field in Workers Builds UI)
# Worker name must match your Cloudflare dashboard Worker name exactly.
name = "oss-goalos-ai"
compatibility_date = "2026-06-24"

[assets]
directory = "./goalos-web/out"
not_found_handling = "404-page"
html_handling = "auto-trailing-slash"
