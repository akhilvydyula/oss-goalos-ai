name: Bug report
description: Report something that isn't working correctly
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting! Please search [existing issues](https://github.com/akhilvydyula/oss-goalos-ai/issues) first.

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Web (goalos-web)
        - Android (goalos-android)
        - Both
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Clear description of the bug
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open Coach tab
        2. Send message
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: |
        - OS: Windows 11 / macOS / Android 14
        - Browser: Chrome 120 (web only)
        - App version / commit: main @ abc123
    validations:
      required: true

  - type: checkboxes
    id: terms
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues
          required: true
        - label: I can reproduce on the latest `main` branch
          required: false
