name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release-web:
    name: Build web production bundle
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: goalos-web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: goalos-web/package-lock.json

      - run: npm ci
      - run: npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: goalos-web-build
          path: goalos-web/.next
          retention-days: 30

  release-android:
    name: Build Android release APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: goalos-android

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - run: chmod +x gradlew
      - run: ./gradlew assembleDebug --no-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: goalos-android-apk
          path: goalos-android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 90

  github-release:
    name: Publish GitHub Release
    needs: [release-web, release-android]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: goalos-android-apk
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: GoalOS AI ${{ github.ref_name }}
          generate_release_notes: true
          files: dist/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
