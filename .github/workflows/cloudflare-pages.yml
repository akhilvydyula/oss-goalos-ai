# Fast static deploy to Cloudflare Pages.
# Optional: set ENABLE_CLOUDFLARE_PAGES=true and add CF secrets (see docs/DEPLOYMENT.md).

name: Deploy Web to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: cloudflare-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    # Set repo variable ENABLE_CLOUDFLARE_PAGES=true after adding CF secrets
    if: vars.ENABLE_CLOUDFLARE_PAGES == 'true'
    permissions:
      contents: read
      deployments: write

    defaults:
      run:
        working-directory: goalos-web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: goalos-web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build:cloudflare

      - name: Publish to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy out --project-name=goalos-ai --commit-dirty=true
